name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Style Check (ruff)
        run: |
          ruff check src tests scripts examples

      - name: Run Tests
        run: |
          python -m pytest -q

      - name: Benchmark Smoke
        run: |
          python scripts/benchmark.py --out benchmark_summary.json --traces 24 --samples 512 --repeat 1 --jobs 2 --min-speedup 1.0

      - name: Upload Benchmark Artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-summary
          path: benchmark_summary.json
